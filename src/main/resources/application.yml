spring:
  application:
    name: productos-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/db_productos}

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.product.productservice: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} traceId=%X{traceId:-N/A} spanId=%X{spanId:-N/A} - %msg%n"
